<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual LCD Web Viewer</title>
    <script type="importmap">
      {
        "imports": {
          "env": "./env-shim.js"
        }
      }
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="crt"></div>
    <main class="shell">
      <section class="grid">
        <article class="panel box">
          <div class="box-head">
            <h2>Painel</h2>
            <span id="fpsPill" class="tag">0 FPS</span>
          </div>
          <p id="metaLine" class="meta">Modo: inicializando</p>

          <div class="viewer-wrap" id="viewerWrap">
            <canvas id="lcdCanvas" width="320" height="240"></canvas>
          </div>

          <div class="hint-row">
            <span>Interação: clique e arraste no display</span>
            <span>Teclas: ↑ ↓ ← → A B Enter Shift</span>
          </div>
        </article>

        <aside class="controls box">
          <h2>Controles</h2>

          <div class="field-group">
            <label for="targetFpsInput">FPS do LCD</label>
            <div class="inline-row">
              <input id="targetFpsInput" type="number" min="1" max="240" step="1" value="60" />
              <button id="applyFpsBtn" class="btn">Aplicar FPS</button>
            </div>
          </div>

          <div class="field-group">
            <label for="sceneSelect">Cena</label>
            <div class="inline-row">
              <select id="sceneSelect">
                <option value="dashboard">Dashboard</option>
                <option value="oscilloscope">Oscilloscope</option>
                <option value="startup">Startup</option>
                <option value="gameboy">Gameboy</option>
              </select>
              <button id="applySceneBtn" class="btn">Aplicar</button>
            </div>
          </div>

          <div class="field-group">
            <label for="scriptEditor">Script LCD</label>
            <textarea id="scriptEditor" spellcheck="false"></textarea>
            <div class="inline-row">
              <button id="runScriptBtn" class="btn">Executar Script</button>
              <button id="resetBtn" class="btn">Reset</button>
            </div>
          </div>

          <div class="field-group">
            <p class="section-label">Execução</p>
            <div class="inline-row">
              <button id="toggleRunBtn" class="btn">Pausar</button>
              <button id="stepBtn" class="btn">Step</button>
            </div>
          </div>

          <p id="statusLine" class="status-line">Inicializando runtime wasm...</p>
        </aside>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
