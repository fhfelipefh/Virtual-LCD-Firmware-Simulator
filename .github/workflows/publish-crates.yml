name: Publish Virtual LCD Crates

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: publish-virtual-lcd-crates
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump virtual crate versions
        id: bump
        run: |
          new_version="$(python3 scripts/bump_virtual_versions.py)"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Run test suite
        run: cargo test

      - name: Authenticate with crates.io Trusted Publishing
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Commit version bump
        run: |
          git add Cargo.toml Cargo.lock \
            virtual-lcd-sdk/Cargo.toml \
            virtual-lcd-core/Cargo.toml \
            virtual-lcd-renderer/Cargo.toml \
            virtual-lcd-examples/Cargo.toml
          git commit -m "chore: release virtual crates v${{ steps.bump.outputs.version }} [skip release]"
          git push

      - name: Publish virtual-lcd-sdk
        run: cargo publish -p virtual-lcd-sdk --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Publish virtual-lcd-core
        run: cargo publish -p virtual-lcd-core --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Publish virtual-lcd-renderer
        run: cargo publish -p virtual-lcd-renderer --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
