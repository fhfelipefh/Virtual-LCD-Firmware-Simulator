name: Deploy Web Viewer to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "virtual-lcd-core/**"
      - "virtual-lcd-sdk/**"
      - "virtual-lcd-examples/**"
      - "virtual-lcd-web/**"
      - "web/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/deploy-web-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build wasm package
        run: wasm-pack build virtual-lcd-web --target web --release --out-dir ../web/pkg

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
